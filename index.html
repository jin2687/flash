<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PhotoFlash - 写真で英単語</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #252838;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --text: #e8eaf0;
      --text2: #8f93a8;
      --success: #43e97b;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    /* ── Nav Tabs ── */
    #app { display: flex; flex-direction: column; min-height: 100vh; }

    nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      display: flex; background: var(--surface);
      border-top: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
    }
    nav button {
      flex: 1; padding: 12px 0 14px;
      background: none; border: none; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      color: var(--text2); font-size: 11px; font-weight: 500;
      transition: color 0.2s;
    }
    nav button.active { color: var(--accent); }
    nav button svg { width: 22px; height: 22px; }

    /* ── Views ── */
    .view { display: none; flex-direction: column; flex: 1; padding-bottom: 70px; }
    .view.active { display: flex; }

    /* ── Camera View ── */
    #camera-view { position: relative; }

    .camera-container {
      position: relative; background: #000;
      width: 100%; aspect-ratio: 3/4; overflow: hidden;
      max-height: 62vw;
    }
    @media (min-width: 480px) {
      .camera-container { aspect-ratio: unset; height: 320px; max-height: 320px; }
    }

    #video {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    #canvas { display: none; }

    .camera-overlay {
      position: absolute; inset: 0; pointer-events: none;
      border: 2px solid rgba(108,99,255,0.4);
    }
    .corner {
      position: absolute; width: 22px; height: 22px;
      border-color: var(--accent); border-style: solid;
    }
    .corner.tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
    .corner.tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
    .corner.bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
    .corner.br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

    .cam-error {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      background: var(--surface); color: var(--text2); font-size: 14px; text-align: center; padding: 20px;
    }
    .cam-error svg { width: 40px; height: 40px; opacity: 0.4; }

    .snap-btn-wrap {
      display: flex; justify-content: center; padding: 18px 20px 10px;
    }
    #snap-btn {
      width: 68px; height: 68px; border-radius: 50%;
      background: var(--accent); border: 4px solid rgba(255,255,255,0.2);
      cursor: pointer; box-shadow: 0 0 0 6px rgba(108,99,255,0.2);
      transition: transform 0.1s, box-shadow 0.1s;
      display: flex; align-items: center; justify-content: center;
    }
    #snap-btn:active { transform: scale(0.93); box-shadow: 0 0 0 3px rgba(108,99,255,0.2); }
    #snap-btn svg { width: 28px; height: 28px; fill: #fff; }

    /* ── OCR Results ── */
    #ocr-section { padding: 0 16px 16px; flex: 1; }

    .section-title {
      font-size: 13px; font-weight: 600; color: var(--text2);
      letter-spacing: 0.06em; text-transform: uppercase;
      margin: 16px 0 10px;
    }

    /* Loading */
    #loading-ui {
      display: none; flex-direction: column;
      align-items: center; gap: 10px; padding: 30px 0;
    }
    #loading-ui.show { display: flex; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(108,99,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-msg { color: var(--text2); font-size: 14px; }
    #ocr-progress {
      font-size: 12px; color: var(--accent); font-variant-numeric: tabular-nums;
    }

    /* Word chips */
    #word-list {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .word-chip {
      padding: 7px 14px; background: var(--surface2);
      border-radius: 20px; font-size: 15px; font-weight: 500;
      cursor: pointer; border: 1.5px solid transparent;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      user-select: none;
    }
    .word-chip:active { transform: scale(0.95); }
    .word-chip:hover, .word-chip:focus { border-color: var(--accent); outline: none; }
    .word-chip.loading {
      opacity: 0.6; pointer-events: none;
      animation: pulse 1s ease-in-out infinite;
    }
    .word-chip.saved { border-color: var(--success); color: var(--success); }
    @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:0.3} }

    /* Toast */
    #toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(10px);
      background: var(--success); color: #fff;
      padding: 9px 20px; border-radius: 22px;
      font-size: 14px; font-weight: 600;
      opacity: 0; transition: opacity 0.25s, transform 0.25s;
      white-space: nowrap; z-index: 200; pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { background: var(--accent2); }

    /* ── Flashcard View ── */
    #cards-view { padding: 0 16px; }

    .cards-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 0 8px;
    }
    .cards-header h1 { font-size: 20px; font-weight: 700; }
    #card-count {
      font-size: 13px; color: var(--text2);
      background: var(--surface2); padding: 4px 10px; border-radius: 12px;
    }

    #cards-empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 14px;
      padding: 60px 20px; text-align: center; color: var(--text2);
    }
    #cards-empty svg { width: 52px; height: 52px; opacity: 0.25; }
    #cards-empty p { font-size: 15px; line-height: 1.6; }

    #cards-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      padding-bottom: 20px;
    }

    .flash-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 16px 14px 14px;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: var(--shadow);
      position: relative; overflow: hidden;
      transition: transform 0.15s;
    }
    .flash-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .flash-card:active { transform: scale(0.97); }
    .card-en {
      font-size: 18px; font-weight: 700; letter-spacing: -0.01em;
      margin-bottom: 6px; line-height: 1.2;
    }
    .card-ja {
      font-size: 13px; color: var(--text2); line-height: 1.4;
    }
    .card-delete {
      position: absolute; top: 8px; right: 8px;
      background: none; border: none; cursor: pointer;
      color: var(--text2); opacity: 0; transition: opacity 0.2s;
      padding: 4px; border-radius: 6px;
    }
    .flash-card:hover .card-delete,
    .flash-card:focus-within .card-delete { opacity: 1; }
    .card-delete:hover { color: var(--accent2); }
    .card-delete svg { width: 14px; height: 14px; }

    /* ── Captured preview strip ── */
    #preview-strip {
      display: none; padding: 0 16px 0;
    }
    #preview-strip.show { display: block; }
    #preview-img {
      width: 100%; max-height: 130px; object-fit: cover;
      border-radius: 10px; border: 1.5px solid var(--accent);
    }
    .retake-btn {
      display: flex; align-items: center; gap: 6px;
      margin-top: 8px; background: none; border: 1px solid rgba(255,255,255,0.1);
      color: var(--text2); font-size: 13px; padding: 6px 12px; border-radius: 8px;
      cursor: pointer; transition: border-color 0.15s, color 0.15s;
    }
    .retake-btn:hover { border-color: var(--accent); color: var(--text); }
    .retake-btn svg { width: 14px; height: 14px; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Camera View ── -->
  <section id="camera-view" class="view active">
    <div class="camera-container">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div class="camera-overlay">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
      </div>
      <div id="cam-error" class="cam-error" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/>
        </svg>
        <span>カメラへのアクセスが<br>許可されていません</span>
      </div>
    </div>

    <div class="snap-btn-wrap">
      <button id="snap-btn" aria-label="撮影する">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
      </button>
    </div>

    <!-- Captured preview -->
    <div id="preview-strip">
      <img id="preview-img" alt="撮影した画像" />
      <button class="retake-btn" id="retake-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 4v6h6M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 005.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 013.51 15"/>
        </svg>
        再撮影
      </button>
    </div>

    <!-- OCR results -->
    <div id="ocr-section">
      <div id="loading-ui">
        <div class="spinner"></div>
        <span id="loading-msg">読み取り中...</span>
        <span id="ocr-progress"></span>
      </div>
      <div id="word-result" style="display:none;">
        <div class="section-title">検出された英単語</div>
        <div id="word-list"></div>
      </div>
    </div>
  </section>

  <!-- ── Cards View ── -->
  <section id="cards-view" class="view">
    <div class="cards-header">
      <h1>単語帳</h1>
      <span id="card-count">0 語</span>
    </div>
    <div id="cards-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
        <rect x="2" y="4" width="20" height="16" rx="3"/>
        <path d="M8 10h8M8 14h5"/>
      </svg>
      <p>まだ単語が保存されていません。<br>カメラで写真を撮って<br>英単語をタップしてみましょう！</p>
    </div>
    <div id="cards-grid"></div>
  </section>

  <!-- ── Bottom Nav ── -->
  <nav>
    <button id="nav-camera" class="active" aria-label="カメラ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      カメラ
    </button>
    <button id="nav-cards" aria-label="単語帳">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="4" width="20" height="16" rx="3"/>
        <path d="M8 10h8M8 14h5"/>
      </svg>
      単語帳
    </button>
  </nav>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── IndexedDB ──────────────────────────────────────────────
const DB_NAME = 'photoflash_db';
const DB_VER  = 1;
const STORE   = 'cards';

let db = null;
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        const os = d.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
        os.createIndex('en', 'en', { unique: true });
      }
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror   = e => rej(e.target.error);
  });
}

function dbSave(en, ja) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readwrite');
    const os = tx.objectStore(STORE);
    // Existing record lookup to keep its id (needed for unique-index put/update)
    const idx = os.index('en');
    const getReq = idx.get(en);
    getReq.onsuccess = () => {
      const existing = getReq.result;
      const record = existing
        ? { id: existing.id, en, ja, savedAt: Date.now() }
        : { en, ja, savedAt: Date.now() };
      const putReq = os.put(record);
      putReq.onsuccess = () => res(putReq.result);
      putReq.onerror   = e => rej(e.target.error);
    };
    getReq.onerror = e => rej(e.target.error);
  });
}

function dbGetAll() {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => res(req.result);
    req.onerror   = e => rej(e.target.error);
  });
}

function dbDelete(id) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).delete(id);
    req.onsuccess = () => res();
    req.onerror   = e => rej(e.target.error);
  });
}

// ── Toast ──────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2200);
}

// ── Navigation ─────────────────────────────────────────────
const views = { camera: document.getElementById('camera-view'), cards: document.getElementById('cards-view') };
const navBtns = { camera: document.getElementById('nav-camera'), cards: document.getElementById('nav-cards') };

function switchView(name) {
  Object.entries(views).forEach(([k, v]) => v.classList.toggle('active', k === name));
  Object.entries(navBtns).forEach(([k, b]) => b.classList.toggle('active', k === name));
  if (name === 'cards') renderCards();
}

navBtns.camera.addEventListener('click', () => switchView('camera'));
navBtns.cards.addEventListener('click',  () => switchView('cards'));

// ── Camera ─────────────────────────────────────────────────
const video    = document.getElementById('video');
const canvas   = document.getElementById('canvas');
const snapBtn  = document.getElementById('snap-btn');
const retakeBtn = document.getElementById('retake-btn');
const previewStrip = document.getElementById('preview-strip');
const previewImg   = document.getElementById('preview-img');
const camError = document.getElementById('cam-error');

let stream = null;

async function startCamera() {
  try {
    if (!navigator.mediaDevices?.getUserMedia) throw new Error('getUserMedia not supported');
    const constraints = {
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 960 } },
      audio: false
    };
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
    video.style.display = '';
    camError.style.display = 'none';
    snapBtn.disabled = false;
  } catch (err) {
    console.warn('Camera error:', err);
    video.style.display = 'none';
    camError.style.display = 'flex';
    snapBtn.disabled = true;
  }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
}

function captureFrame() {
  const w = video.videoWidth  || 640;
  const h = video.videoHeight || 480;
  canvas.width  = w;
  canvas.height = h;
  canvas.getContext('2d').drawImage(video, 0, 0, w, h);
  return canvas.toDataURL('image/jpeg', 0.9);
}

snapBtn.addEventListener('click', () => {
  if (!stream) return;
  const dataUrl = captureFrame();
  previewImg.src = dataUrl;
  previewStrip.classList.add('show');
  runOCR(dataUrl);
});

retakeBtn.addEventListener('click', () => {
  previewStrip.classList.remove('show');
  document.getElementById('word-result').style.display = 'none';
  document.getElementById('loading-ui').classList.remove('show');
  document.getElementById('word-list').innerHTML = '';
});

// ── Image Preprocessing ────────────────────────────────────
/**
 * Preprocess image for better OCR accuracy:
 * 1. Upscale to at least 1600px wide (Tesseract prefers larger images)
 * 2. Grayscale
 * 3. Contrast stretch (normalize min/max to 0-255)
 * 4. Adaptive threshold (Otsu-like: pixels above mean → white, below → black)
 */
function preprocessImage(dataUrl) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      // ① Upscale: Tesseract accuracy improves significantly above 1800px
      const MIN_W = 1800;
      const scale = img.width < MIN_W ? MIN_W / img.width : 1;
      const PAD   = 40; // white border helps Tesseract avoid edge clipping
      const w = Math.round(img.width  * scale);
      const h = Math.round(img.height * scale);
      const cw = w + PAD * 2;
      const ch = h + PAD * 2;

      const c = document.createElement('canvas');
      c.width = cw; c.height = ch;
      const ctx = c.getContext('2d');

      // Fill with white (padding)
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, cw, ch);
      ctx.drawImage(img, PAD, PAD, w, h);

      const imgData = ctx.getImageData(0, 0, cw, ch);
      const d = imgData.data;
      const N = cw * ch;

      // ② Grayscale
      const gray = new Float32Array(N);
      for (let i = 0; i < N; i++) {
        gray[i] = 0.299 * d[i*4] + 0.587 * d[i*4+1] + 0.114 * d[i*4+2];
      }

      // ③ Descreen: 5×5 Gaussian blur removes screen-pixel moiré from photos of displays
      //    kernel = [1,4,7,4,1; 4,16,26,16,4; 7,26,41,26,7; ...] / 273
      const GK = [1,4,7,4,1, 4,16,26,16,4, 7,26,41,26,7, 4,16,26,16,4, 1,4,7,4,1];
      const descreened = new Float32Array(N);
      for (let y = 0; y < ch; y++) {
        for (let x = 0; x < cw; x++) {
          let sum = 0, wsum = 0;
          for (let dy = -2; dy <= 2; dy++) {
            for (let dx = -2; dx <= 2; dx++) {
              const nx = x+dx, ny = y+dy;
              if (nx >= 0 && nx < cw && ny >= 0 && ny < ch) {
                const w = GK[(dy+2)*5+(dx+2)];
                sum += gray[ny * cw + nx] * w; wsum += w;
              }
            }
          }
          descreened[y * cw + x] = sum / wsum;
        }
      }

      // ④ Unsharp mask on descreened image (3×3 box blur for local contrast)
      const blurred = new Float32Array(N);
      for (let y = 0; y < ch; y++) {
        for (let x = 0; x < cw; x++) {
          let sum = 0, cnt = 0;
          for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
              const nx = x+dx, ny = y+dy;
              if (nx >= 0 && nx < cw && ny >= 0 && ny < ch) {
                sum += descreened[ny * cw + nx]; cnt++;
              }
            }
          }
          blurred[y * cw + x] = sum / cnt;
        }
      }
      const SHARP_AMT = 2.0;
      for (let i = 0; i < N; i++) {
        gray[i] = Math.min(255, Math.max(0, descreened[i] + SHARP_AMT * (descreened[i] - blurred[i])));
      }

      // ④ Contrast stretch (clamp 2nd–98th percentile → 0–255)
      const sorted = Float32Array.from(gray).sort();
      const lo = sorted[Math.floor(N * 0.02)];
      const hi = sorted[Math.floor(N * 0.98)];
      const range = hi - lo || 1;
      for (let i = 0; i < N; i++) {
        gray[i] = Math.min(255, Math.max(0, (gray[i] - lo) / range * 255));
      }

      // ⑤ Write grayscale back — NO manual binarization.
      //    Tesseract applies its own per-region adaptive threshold internally (Leptonica),
      //    which handles mixed backgrounds (dark scene + bright UI bubbles) far better
      //    than a single global Otsu threshold.
      for (let i = 0; i < N; i++) {
        const v = Math.round(gray[i]);
        d[i*4] = d[i*4+1] = d[i*4+2] = v;
        d[i*4+3] = 255;
      }

      ctx.putImageData(imgData, 0, 0);
      resolve(c.toDataURL('image/png'));
    };
    img.src = dataUrl;
  });
}

// ── OCR ────────────────────────────────────────────────────
const loadingUI  = document.getElementById('loading-ui');
const loadingMsg = document.getElementById('loading-msg');
const ocrProgress = document.getElementById('ocr-progress');
const wordResult  = document.getElementById('word-result');
const wordList    = document.getElementById('word-list');

async function runOCR(dataUrl) {
  loadingUI.classList.add('show');
  wordResult.style.display = 'none';
  wordList.innerHTML = '';
  loadingMsg.textContent = '画像処理中...';
  ocrProgress.textContent = '';

  try {
    // Preprocess before OCR
    const processedUrl = await preprocessImage(dataUrl);

    // Also create an inverted version: handles light text on dark background
    // (e.g. game UI text on dark scenes, white subtitles, etc.)
    const invertedUrl = await (async () => {
      const img = new Image();
      await new Promise(r => { img.onload = r; img.src = processedUrl; });
      const c = document.createElement('canvas');
      c.width = img.width; c.height = img.height;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const id = ctx.getImageData(0, 0, c.width, c.height);
      const d = id.data;
      for (let i = 0; i < d.length; i += 4) {
        d[i] = 255 - d[i]; d[i+1] = 255 - d[i+1]; d[i+2] = 255 - d[i+2];
      }
      ctx.putImageData(id, 0, 0);
      return c.toDataURL('image/png');
    })();

    // 4 passes: normal×3 PSMs + inverted sparse
    const PSM_PASSES = [
      { url: processedUrl, mode: Tesseract.PSM.AUTO,         label: '解析中 (1/4)...' },
      { url: processedUrl, mode: Tesseract.PSM.SINGLE_BLOCK, label: '解析中 (2/4)...' },
      { url: processedUrl, mode: Tesseract.PSM.SPARSE_TEXT,  label: '解析中 (3/4)...' },
      { url: invertedUrl,  mode: Tesseract.PSM.SPARSE_TEXT,  label: '解析中 (4/4)...' },
    ];

    const worker = await Tesseract.createWorker('eng', 1, {
      logger: m => {
        if (m.status === 'recognizing text') {
          ocrProgress.textContent = Math.round(m.progress * 100) + '%';
        } else {
          loadingMsg.textContent = statusLabel(m.status);
        }
      }
    });

    await worker.setParameters({
      tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz ',
    });

    let combinedText = '';
    for (const { url, mode, label } of PSM_PASSES) {
      loadingMsg.textContent = label;
      await worker.setParameters({ tessedit_pageseg_mode: mode });
      const { data: { text } } = await worker.recognize(url);
      combinedText += ' ' + text;
    }
    await worker.terminate();

    const words = extractWords(combinedText);
    loadingUI.classList.remove('show');

    if (words.length === 0) {
      showToast('英単語が見つかりませんでした', true);
      return;
    }

    wordResult.style.display = 'block';
    words.forEach(w => {
      const chip = document.createElement('button');
      chip.className = 'word-chip';
      chip.textContent = w;
      chip.addEventListener('click', () => translateAndSave(w, chip));
      wordList.appendChild(chip);
    });
  } catch (err) {
    console.error('OCR error:', err);
    loadingUI.classList.remove('show');
    showToast('OCRエラーが発生しました', true);
  }
}

function statusLabel(status) {
  const map = {
    'loading tesseract core': 'エンジン読込中...',
    'initializing tesseract': '初期化中...',
    'loading language traineddata': '言語データ読込中...',
    'initializing api': 'API初期化中...',
    'recognizing text': '文字認識中...',
  };
  return map[status] || status;
}

function extractWords(text) {
  const raw = text.match(/\b[A-Za-z]{2,}\b/g) || [];
  const STOPWORDS = new Set([
    'the','a','an','is','it','in','on','at','to','of','or','and','be','we',
    'he','she','they','this','that','with','for','are','was','were','not','no',
    'so','do','if','as','by','my','us','me','up','am','pm','ok','id','vs',
    'can','has','had','have','may','mr','dr','st','etc','its','our','all',
    'but','yet','too','set','get','put','got','let','see','say','did','use',
    'her','him','his','their','your','from','into','will','been','than',
    'then','when','what','which','who','how','any','one','two','new','old',
  ]);
  const seenLower = new Set();
  return raw
    .filter(w => {
      const lower = w.toLowerCase();
      if (STOPWORDS.has(lower)) return false;
      if (seenLower.has(lower)) return false;
      seenLower.add(lower);
      return true;
    })
    .slice(0, 30);
}

// ── Translate & Save ────────────────────────────────────────
async function translateAndSave(word, chipEl) {
  chipEl.classList.add('loading');
  const wordLower = word.toLowerCase();
  try {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(wordLower)}&langpair=en|ja`;
    const res  = await fetch(url);
    const json = await res.json();
    const ja   = json?.responseData?.translatedText || '訳なし';

    await dbSave(wordLower, ja);
    chipEl.classList.remove('loading');
    chipEl.classList.add('saved');
    chipEl.disabled = true;
    showToast(`「${word}」を保存しました ✓`);
  } catch (err) {
    console.error('Translate error:', err);
    chipEl.classList.remove('loading');
    showToast('翻訳に失敗しました', true);
  }
}

// ── Render Cards ────────────────────────────────────────────
async function renderCards() {
  const grid  = document.getElementById('cards-grid');
  const empty = document.getElementById('cards-empty');
  const count = document.getElementById('card-count');
  grid.innerHTML = '';

  const cards = await dbGetAll();
  cards.sort((a, b) => b.savedAt - a.savedAt);

  count.textContent = `${cards.length} 語`;

  if (cards.length === 0) {
    empty.style.display = 'flex';
    grid.style.display  = 'none';
    return;
  }
  empty.style.display = 'none';
  grid.style.display  = 'grid';

  cards.forEach(card => {
    const el = document.createElement('div');
    el.className = 'flash-card';
    el.innerHTML = `
      <div class="card-en">${escHtml(card.en)}</div>
      <div class="card-ja">${escHtml(card.ja)}</div>
      <button class="card-delete" data-id="${card.id}" aria-label="削除">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M9 6V4h6v2"/>
        </svg>
      </button>
    `;
    el.querySelector('.card-delete').addEventListener('click', async e => {
      const id = Number(e.currentTarget.dataset.id);
      await dbDelete(id);
      el.style.transition = 'opacity 0.2s, transform 0.2s';
      el.style.opacity = '0';
      el.style.transform = 'scale(0.9)';
      setTimeout(() => renderCards(), 220);
    });
    grid.appendChild(el);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ───────────────────────────────────────────────────
(async () => {
  await openDB();
  await startCamera();
})();
</script>
